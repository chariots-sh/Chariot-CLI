name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'ai:claude') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Delete previous Claude review comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --paginate --jq '.[] | select(.body | contains("<!-- claude-code-review -->")) | .id' \
          | while read -r comment_id; do
              gh api -X DELETE repos/${{ github.repository }}/issues/comments/$comment_id
            done

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a pull request for the Chariot CLI — a Go command-line
            tool built on Cobra that deploys and manages agent fleets. Layout: `cmd/`
            (Cobra commands), `internal/api` (backend HTTP client), `internal/config`
            (local config), `internal/update` (self-update). The README's Development
            section has the project conventions. Key rules to enforce:

            - **Output through the command**: all command output must go through
              `cmd.OutOrStdout()` / `cmd.ErrOrStderr()`, never `fmt.Print*` to the
              process streams — tests capture output through the command.
            - **Errors that teach**: user-facing errors must name the fixing command
              (e.g. "not logged in — run `chariot login` first"). Commands use `RunE`
              and return errors; they don't `os.Exit` mid-flow.
            - **No network in tests**: tests must set `disableAutoUpdateCheck` and use
              `httptest` servers — never call the real backend, GitHub, or Docker.
            - **Secret hygiene**: the token-seed and session token must never be
              written anywhere unintended. Files containing secrets are written 0600.
              Secrets must not appear in logs, errors, or debug output.
            - **Error wrapping**: wrap with `fmt.Errorf("...: %w", err)` so callers
              can unwrap; propagate `cmd.Context()` into API calls.
            - **Help/docs drift**: new or changed commands and flags must update the
              command's Use/Short/Long text, and the README when user-visible.

            Review this PR for:
            1. Correctness bugs — nil derefs, unhandled error paths, races, broken
               flag/argument handling
            2. Adherence to the conventions above
            3. Secret leakage or unsafe file permissions
            4. Test coverage for new logic, and tests that violate the no-network rule
            5. UX regressions — unclear errors, output that breaks scripting, help
               text that no longer matches behavior

            Format your review as a structured markdown report. Be specific —
            reference file names and line numbers. Only flag real issues, not style
            nitpicks.

            When posting your review, use `gh pr comment` with your Bash tool. Your comment MUST:
            1. Start with the hidden marker: <!-- claude-code-review -->
            2. Wrap the entire review body in a collapsible section:
               <details><summary>Claude Code Review</summary>

               ...your review content here...

               </details>

          claude_args: '--model claude-fable-5 --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
