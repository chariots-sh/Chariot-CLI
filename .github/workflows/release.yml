name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}

      # goreleaser's announce.discord integration only targets one webhook
      # (see .goreleaser.yaml). #announcements is a separate channel/webhook,
      # so it gets a plain curl POST instead.
      - name: Announce release to #announcements
        env:
          DISCORD_ANNOUNCEMENTS_WEBHOOK_URL: ${{ secrets.DISCORD_ANNOUNCEMENTS_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          PAYLOAD="$(jq -n --arg content "**chariot ${TAG}** is out — ${RELEASE_URL}" '{content: $content}')"
          curl -sS -f --max-time 15 \
            -X POST "$DISCORD_ANNOUNCEMENTS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
